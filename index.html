<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TGN - Gestión de Flota</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <h1>CENTRO DE CONTROL <span>PLAN OHL</span></h1>
        <div id="filters">
            <button class="filter-btn active" onclick="filtrar('TODAS')">TODAS</button>
            <button class="filter-btn" onclick="filtrar('M100')">M100</button>
            <button class="filter-btn" onclick="filtrar('T70')">T70</button>
            <button class="filter-btn" onclick="filtrar('T60')">T60</button>
        </div>
        <div id="status">Sincronizando...</div>
    </header>
    
    <main>
        <section id="map-container">
            <div id="map"></div>
        </section>
        
        <section id="timeline-container">
            <div class="panel-header">
                <h3>Cronograma de Movimientos (2022 - 2031)</h3>
            </div>
            
            <div id="gantt-wrapper">
                <div id="timeline-viewport">
                    <div id="today-line"><span class="today-label">HOY</span></div>
                    <div id="timeline-scale">
                        <div class="year-block">2022</div>
                        <div class="year-block">2023</div>
                        <div class="year-block">2024</div>
                        <div class="year-block">2025</div>
                        <div class="year-block">2026</div>
                        <div class="year-block">2027</div>
                        <div class="year-block">2028</div>
                        <div class="year-block">2029</div>
                        <div class="year-block">2030</div>
                        <div class="year-block">2031</div>
                    </div>
                    <div id="gantt-rows"></div>
                </div>
            </div>
        </section>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js"></script>
</body>
</html>
