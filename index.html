<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TGN Control | Centro de Operaciones</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#0a0a0a] text-slate-100 font-['Inter'] overflow-hidden h-screen flex">

    <aside class="w-80 bg-black border-r border-white/5 flex flex-col z-[1000]">
        <div class="p-6 border-b border-white/5 flex justify-center items-center bg-zinc-900/20">
            <img src="tgn_h.png" alt="TGN" class="w-full h-auto object-contain px-2">
        </div>

        <div class="flex-1 p-6 space-y-4">
            <span class="text-[#E48A06] font-black text-[10px] uppercase tracking-[0.3em] block mb-6 opacity-70">Sistemas de Gestión</span>
            
            <button onclick="showView('home-view')" class="nav-btn active w-full flex items-center gap-4 px-6 py-4 rounded-sm border border-white/5 bg-white/5 hover:bg-white/10 transition-all">
                <i class="fas fa-globe-americas text-[#E48A06]"></i>
                <span class="font-black uppercase text-xs tracking-widest">Mapa Global</span>
            </button>

            <button onclick="showView('gantt-view', 'M100')" class="nav-btn w-full flex items-center gap-4 px-6 py-4 rounded-sm border border-white/5 hover:border-[#E48A06]/50 transition-all group">
                <i class="fas fa-layer-group group-hover:text-[#E48A06]"></i>
                <span class="font-black uppercase text-xs tracking-widest">Plan OHL M100</span>
            </button>

            <button onclick="showView('gantt-view', 'T70')" class="nav-btn w-full flex items-center gap-4 px-6 py-4 rounded-sm border border-white/5 hover:border-[#E48A06]/50 transition-all group">
                <i class="fas fa-layer-group group-hover:text-[#E48A06]"></i>
                <span class="font-black uppercase text-xs tracking-widest">Plan OHL T70</span>
            </button>

            <button onclick="showView('gantt-view', 'T60')" class="nav-btn w-full flex items-center gap-4 px-6 py-4 rounded-sm border border-white/5 hover:border-[#E48A06]/50 transition-all group">
                <i class="fas fa-layer-group group-hover:text-[#E48A06]"></i>
                <span class="font-black uppercase text-xs tracking-widest">Plan OHL T60</span>
            </button>
        </div>

        <div class="p-6 border-t border-white/5 bg-zinc-900/10">
            <div id="status" class="text-[9px] font-mono text-zinc-500 uppercase tracking-widest">Conectando...</div>
        </div>
    </aside>

    <main class="flex-1 relative overflow-hidden">
        
        <div id="home-view" class="page-view absolute inset-0 active">
            <div id="map" class="w-full h-full"></div>
        </div>

        <div id="gantt-view" class="page-view absolute inset-0 hidden bg-[#0d0d0d] flex flex-col">
            <div class="p-8 border-b border-white/5 flex justify-between items-center bg-black/40">
                <h2 id="gantt-title" class="font-audiowide text-3xl uppercase text-[#E48A06]">PLAN OHL</h2>
                <div class="text-[10px] font-black text-white/30 uppercase tracking-[0.2em]">Ventana: 2022-2031</div>
            </div>
            <div id="gantt-wrapper" class="flex-1 overflow-auto relative">
                <div id="timeline-viewport" class="w-[3500px] relative min-h-full">
                    <div id="today-line"><span class="today-label">HOY</span></div>
                    <div id="timeline-scale" class="flex sticky top-0 z-30 bg-black border-b border-white/5 ml-[180px]">
                        </div>
                    <div id="gantt-rows" class="pt-4 pb-20"></div>
                </div>
            </div>
        </div>

    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js"></script>
</body>
</html>
